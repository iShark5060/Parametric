name: Deploy Parametric Development

permissions:
  contents: read

on:
  push:
    branches: [development]
    paths:
      - 'client/**'
      - 'server/**'
      - 'icons/**'
      - 'index.html'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST_DEV }}
      SERVER_PATH: ${{ secrets.SERVER_PATH_DEV }}
      SERVER_USER: ${{ secrets.SERVER_USER_DEV }}
      SERVER_HOST: ${{ secrets.SERVER_HOST_DEV }}
      VITE_ENV: ${{ secrets.VITE_ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create build-time .env for Vite
        run: |
          if [ -z "$VITE_ENV" ]; then
            echo "ERROR: VITE_ENV secret is missing or empty."
            exit 1
          fi
          printf '%s\n' "$VITE_ENV" > .env

      - name: Build project
        run: npm run build

      - name: Setup SSH
        run: |
          require_non_empty() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
          }

          require_non_empty "SSH_PRIVATE_KEY_DEV" "$SSH_PRIVATE_KEY"
          require_non_empty "SERVER_KNOWN_HOST_DEV" "$SERVER_KNOWN_HOST"
          require_non_empty "SERVER_HOST_DEV" "$SERVER_HOST"
          require_non_empty "SERVER_USER_DEV" "$SERVER_USER"
          require_non_empty "SERVER_PATH_DEV" "$SERVER_PATH"

          if [ -n "${RSYNC_DEST:-}" ]; then
            require_non_empty "RSYNC_DEST" "$RSYNC_DEST"
          fi

          case "$SERVER_PATH" in
            ""|"/"|"."|".."|"~"|"~/"|"/home"|"/root")
              echo "ERROR: SERVER_PATH_DEV has unsafe value: '$SERVER_PATH'"
              exit 1
              ;;
          esac
          case "$SERVER_PATH" in
            "~"*|*".."*|*"/./"*|*"/../"*|*"//"*)
              echo "ERROR: SERVER_PATH_DEV contains unsafe path segments: '$SERVER_PATH'"
              exit 1
              ;;
          esac

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp -r icons/ /tmp/deploy/
          cp package*.json /tmp/deploy/
          if [ -f favicon.ico ]; then cp favicon.ico /tmp/deploy/; fi
          cd /tmp/deploy && npm ci --omit=dev

      - name: Deploy to server
        run: |
          rsync -av --delete \
          --exclude='/.env' \
          --exclude='/.env.local' \
          --exclude='/logs/' \
          --exclude='/data/' \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          /tmp/deploy/ \
          $SERVER_USER@$SERVER_HOST:$SERVER_PATH/

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            $SERVER_USER@$SERVER_HOST \
            "cd $SERVER_PATH && source ~/.nvm/nvm.sh && pm2 restart '[DEV] Parametric' --update-env"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
