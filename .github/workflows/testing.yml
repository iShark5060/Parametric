name: Run Tests

permissions:
  contents: read

on:
  pull_request:

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Dependabot PRs only receive Dependabot secrets, not repository Actions secrets.
      - name: Prepare CI environment
        run: |
          if [ -n "${DOTENV_PRIVATE_KEY_DEVELOPMENT:-}" ]; then
            echo "USE_DOTENVX=true" >> "$GITHUB_ENV"
          else
            echo "USE_DOTENVX=false" >> "$GITHUB_ENV"
            echo "::notice title=CI env::No DOTENV_PRIVATE_KEY_DEVELOPMENT (Dependabot/forks). Running build and tests without dotenvx. Optional: add this secret under Settings → Secrets and variables → Actions → Dependabot to match encrypted .env.development."
          fi

      - name: Build project
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run build
          else
            pnpm run build
          fi

      - name: Run tests
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run test
          else
            pnpm run test
          fi
