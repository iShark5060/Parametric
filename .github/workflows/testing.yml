name: Run Tests

permissions:
  contents: read

on:
  pull_request:

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate dotenv private key
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_DEVELOPMENT" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_DEVELOPMENT secret is missing or empty."
            exit 1
          fi

      - name: Build project
        run: pnpm exec dotenvx run --strict -f .env.development -- pnpm run build

      - name: Run tests
        run: pnpm exec dotenvx run --strict -f .env.development -- pnpm run test
