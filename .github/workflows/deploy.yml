name: Deploy Parametric

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - 'icons/**'
      - 'index.html'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.env.production'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_PRODUCTION" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_PRODUCTION secret is missing or empty."
            exit 1
          fi
          npx dotenvx run --strict -f .env.production -- npm run build

      - name: Setup SSH
        run: |
          require_non_empty() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
          }

          require_non_empty "SSH_PRIVATE_KEY" "$SSH_PRIVATE_KEY"
          require_non_empty "SERVER_KNOWN_HOST" "$SERVER_KNOWN_HOST"
          require_non_empty "SERVER_HOST" "$SERVER_HOST"
          require_non_empty "SERVER_USER" "$SERVER_USER"
          require_non_empty "SERVER_PATH" "$SERVER_PATH"
          require_non_empty "SERVER_SSH_PORT" "$SERVER_SSH_PORT"

          if [ -n "${RSYNC_DEST:-}" ]; then
            require_non_empty "RSYNC_DEST" "$RSYNC_DEST"
          fi

          case "$SERVER_PATH" in
            ""|"/"|"."|".."|"~"|"~/"|"/home"|"/root")
              echo "ERROR: SERVER_PATH has unsafe value: '$SERVER_PATH'"
              exit 1
              ;;
          esac
          case "$SERVER_PATH" in
            "~"*|*".."*|*"/./"*|*"/../"*|*"//"*)
              echo "ERROR: SERVER_PATH contains unsafe path segments: '$SERVER_PATH'"
              exit 1
              ;;
          esac

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp -r icons/ /tmp/deploy/
          cp package*.json /tmp/deploy/
          if [ -f .env.production ]; then cp .env.production /tmp/deploy/; fi
          if [ -f favicon.ico ]; then cp favicon.ico /tmp/deploy/; fi
          cd /tmp/deploy && npm ci --omit=dev

      - name: Deploy to server
        run: |
          rsync -avp --delete \
          --exclude='/.env' \
          --exclude='/.env.local' \
          --exclude='/logs/' \
          --exclude='/data/' \
          -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          /tmp/deploy/ \
          $SERVER_USER@$SERVER_HOST:$SERVER_PATH/

          DOTENV_KEY_B64=$(printf '%s' "$DOTENV_PRIVATE_KEY_PRODUCTION" | base64 | tr -d '\n')
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SERVER_USER@$SERVER_HOST" \
            "cd \"$SERVER_PATH\" && printf 'DOTENV_PRIVATE_KEY_PRODUCTION=%s\n' \"\$(printf '%s' \"$DOTENV_KEY_B64\" | base64 -d)\" > .env.keys && chmod 600 .env.keys && test -f .env.keys || { echo 'ERROR: Failed to create or configure .env.keys on server'; exit 1; }"

      - name: Restart PM2
        run: |
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            $SERVER_USER@$SERVER_HOST \
            "cd $SERVER_PATH && source ~/.nvm/nvm.sh && pm2 restart 'Parametric' --update-env"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
